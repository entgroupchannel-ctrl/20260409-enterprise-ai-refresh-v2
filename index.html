    <script type="application/ld+json">
    {

        {
          "@type": "Question",
          "name": "ENT Group จำหน่ายสินค้าอะไรบ้าง?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ENT Group จำหน่ายคอมพิวเตอร์อุตสาหกรรมครบวงจร ได้แก่ Mini PC (GT Series, GB Series), Panel PC แบบสัมผัส (GK Series), Embedded Box PC (iBox Series, EPC Series), Rugged Tablet/Notebook/Handheld กันกระแทกกันน้ำ, Industrial Switch (Volktek), Zero Client (vCloudPoint), ตู้ Rack และ KIOSK สำเร็จรูป นำเข้าจากโรงงานโดยตรง พร้อมรับประกัน 1-3 ปี"
          }
        },
        {
          "@type": "Question",
          "name": "ENT Group ให้บริการอะไรบ้าง?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ENT Group ให้บริการครบวงจร ตั้งแต่ให้คำปรึกษาเลือกสินค้า, ออกใบเสนอราคา, จัดส่งทั่วประเทศ, ติดตั้งและตั้งค่า, รับประกันสินค้า, ซ่อมบำรุง และบริการหลังการขาย รองรับทั้งลูกค้า B2B องค์กร โรงงาน และหน่วยงานราชการ"
          }
        },
        {
          "@type": "Question",
          "name": "Mini PC คืออะไร? เหมาะกับงานอะไร?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Mini PC คือคอมพิวเตอร์ขนาดเล็กที่ออกแบบมาให้ประหยัดพื้นที่และพลังงาน เหมาะสำหรับงาน POS, Digital Signage, KIOSK, Thin Client, Edge Computing และงานสำนักงานทั่วไป โดย ENT Group จำหน่าย GT Series (Fanless) และ GB Series (พัดลมระบายความร้อน) ราคาเริ่มต้นประมาณ 8,000 บาท"
          }
        },
        {
          "@type": "Question",
          "name": "Panel PC คืออะไร? ใช้ในโรงงานอย่างไร?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Panel PC คือคอมพิวเตอร์อุตสาหกรรมที่มีหน้าจอสัมผัสในตัว ออกแบบมาเพื่อใช้งานในโรงงาน สายการผลิต ระบบ HMI/SCADA ระบบควบคุมคุณภาพ และ KIOSK บริการ ทนฝุ่น ทนน้ำ ทนแรงกระแทก รุ่น GK Series ของ ENT Group มีขนาดตั้งแต่ 15 ถึง 21.5 นิ้ว"
          }
        },
        {
          "@type": "Question",
          "name": "Rugged Tablet ต่างจาก Tablet ทั่วไปอย่างไร?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Rugged Tablet ออกแบบมาสำหรับงานภาคสนาม กันน้ำ กันฝุ่น กันกระแทก (MIL-STD-810G, IP65/IP67) มีแบตเตอรี่ใหญ่ รองรับ 4G/5G, GPS, Barcode Scanner ในตัว เหมาะกับงานคลังสินค้า โลจิสติกส์ ก่อสร้าง เหมืองแร่ และงานตรวจสอบภาคสนาม"
          }
        },
        {
          "@type": "Question",
          "name": "ENT Group อยู่ที่ไหน? ติดต่อได้อย่างไร?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ENT Group ตั้งอยู่ที่ 70/5 เมโทร บิซทาวน์ แจ้งวัฒนะ 2 หมู่ที่ 4 ตำบลคลองพระอุดม อำเภอปากเกร็ด จังหวัดนนทบุรี 11120 โทร 02-045-6104 แฟกซ์ 02-045-6105 อีเมล info@entgroup.co.th เว็บไซต์ www.entgroup.co.th เปิดทำการ จันทร์-ศุกร์ 08:30-17:30 น."
          }
        },
        {
          "@type": "Question",
          "name": "จัดส่งสินค้าอย่างไร? ใช้เวลากี่วัน?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ENT Group จัดส่งฟรีในเขตกรุงเทพและปริมณฑล ภายใน 3-5 วันทำการ สำหรับต่างจังหวัดใช้เวลา 5-7 วันทำการ สินค้าที่มีในสต็อกจัดส่งภายใน 1-2 วันทำการ กรณีสั่งผลิตใช้เวลา 4-6 สัปดาห์"
          }
        }
      ]
